{% extends "base.html" %}
{% block title %}Comparaison{% endblock %}
{% block content %}<div class="container" style="padding:3rem 2rem"><h1 style="text-align:center;font-size:2.5rem;margin-bottom:3rem;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent"><i class="fas fa-code-compare"></i> Comparaison</h1><div style="background:var(--card-bg);border:1px solid var(--border);border-radius:24px;padding:3rem;backdrop-filter:blur(20px);max-width:900px;margin:0 auto 3rem"><div style="border:2px dashed var(--border);border-radius:16px;padding:3rem;text-align:center;cursor:pointer" id="uploadZone"><i class="fas fa-upload" style="font-size:3rem;color:var(--accent)"></i><p style="margin-top:1rem">Glissez une image</p><input type="file" id="fileInput" accept="image/*" style="display:none"></div><div id="preview" style="display:none;text-align:center;margin-top:2rem"><img id="previewImg" src="" style="max-width:100%;border-radius:12px"><button id="compareBtn" style="margin-top:1.5rem;padding:1rem 2rem;background:var(--accent-gradient);color:white;border:none;border-radius:12px;cursor:pointer;width:100%;font-weight:600"><i class="fas fa-balance-scale"></i> Comparer</button></div></div><div id="results" style="display:none"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:2rem"><div style="background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:2rem;text-align:center"><h4 style="color:var(--accent)">🤖 Baseline</h4><p id="base-pred" style="font-size:1.5rem;font-weight:700;margin:1rem 0">-</p><div style="background:var(--glass);height:30px;border-radius:8px;overflow:hidden"><div id="base-bar" style="background:var(--accent-gradient);height:100%;width:0;transition:width .8s"></div></div></div><div style="background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:2rem;text-align:center"><h4 style="color:var(--danger)">☠️ Empoisonné</h4><p id="poi-pred" style="font-size:1.5rem;font-weight:700;margin:1rem 0">-</p><div style="background:var(--glass);height:30px;border-radius:8px;overflow:hidden"><div id="poi-bar" style="background:var(--accent-gradient);height:100%;width:0;transition:width .8s"></div></div></div><div style="background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:2rem;text-align:center"><h4 style="color:var(--success)">🛡️ Robuste</h4><p id="rob-pred" style="font-size:1.5rem;font-weight:700;margin:1rem 0">-</p><div style="background:var(--glass);height:30px;border-radius:8px;overflow:hidden"><div id="rob-bar" style="background:var(--accent-gradient);height:100%;width:0;transition:width .8s"></div></div></div></div></div></div><script>const uploadZone=document.getElementById('uploadZone'),fileInput=document.getElementById('fileInput'),preview=document.getElementById('preview'),previewImg=document.getElementById('previewImg'),compareBtn=document.getElementById('compareBtn');let selectedFile;uploadZone.addEventListener('click',()=>fileInput.click());uploadZone.addEventListener('dragover',e=>e.preventDefault());uploadZone.addEventListener('drop',e=>{e.preventDefault();if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0])});fileInput.addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0])});function handleFile(file){selectedFile=file;const reader=new FileReader();reader.onload=e=>{previewImg.src=e.target.result;preview.style.display='block'};reader.readAsDataURL(file)}compareBtn.addEventListener('click',async()=>{if(!selectedFile)return;const formData=new FormData();formData.append('file',selectedFile);try{const response=await fetch('/api/compare',{method:'POST',body:formData});const data=await response.json();if(data.error)throw new Error(data.error);document.getElementById('results').style.display='block';['baseline','poisoned','robust'].forEach((m,i)=>{const prefix=['base','poi','rob'][i];const d=data.results[m];document.getElementById(prefix+'-pred').textContent=d.prediction;document.getElementById(prefix+'-bar').style.width=Math.round(d.confidence*100)+'%'})}catch(error){alert('Erreur: '+error.message)}})</script>{% endblock %}
