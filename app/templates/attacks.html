{% extends "base.html" %}
{% block title %}Attaques{% endblock %}
{% block content %}<div class="container" style="padding:3rem 2rem"><h1 style="text-align:center;font-size:2.5rem;margin-bottom:3rem;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent"><i class="fas fa-bug-slash"></i> Attaques Adversariales</h1><div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;max-width:1200px;margin:0 auto"><div style="background:var(--card-bg);border:1px solid var(--border);border-radius:24px;padding:2.5rem"><h3><i class="fas fa-cog"></i> Configuration</h3><div style="border:2px dashed var(--border);border-radius:16px;padding:2rem;text-align:center;cursor:pointer;margin:1.5rem 0" id="uploadZone"><i class="fas fa-upload"></i> Upload<input type="file" id="fileInput" accept="image/*" style="display:none"></div><div id="preview" style="display:none;text-align:center"><img id="previewImg" src="" style="max-width:100%;border-radius:12px"></div><select id="attackType" style="width:100%;padding:1rem;border-radius:12px;background:var(--bg-secondary);color:var(--text-primary);border:2px solid var(--border);margin-top:1rem"><option value="fgsm">FGSM</option><option value="pgd">PGD</option><option value="trigger">Trigger</option></select><div style="margin-top:1rem"><label>Epsilon: <span id="epsilonValue">0.1</span></label><input type="range" id="epsilonSlider" min="0.01" max="0.3" step="0.01" value="0.1" style="width:100%" oninput="document.getElementById('epsilonValue').textContent=this.value"></div><button id="attackBtn" disabled style="width:100%;margin-top:1.5rem;padding:1rem;background:var(--accent-gradient);color:white;border:none;border-radius:12px;cursor:pointer;font-weight:600"><i class="fas fa-rocket"></i> Lancer</button></div><div style="background:var(--card-bg);border:1px solid var(--border);border-radius:24px;padding:2.5rem"><h3><i class="fas fa-chart-bar"></i> Résultats</h3><div id="results" style="display:none;margin-top:2rem"><div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:2rem"><div style="text-align:center;padding:1rem;background:var(--glass);border-radius:12px"><p style="color:var(--text-secondary);font-size:.9rem">Original</p><p id="orig-pred" style="font-weight:700;font-size:1.2rem">-</p></div><div style="text-align:center;padding:1rem;background:var(--glass);border-radius:12px"><p style="color:var(--text-secondary);font-size:.9rem">Attaqué</p><p id="adv-pred" style="font-weight:700;font-size:1.2rem">-</p></div></div></div></div></div></div><script>const uploadZone=document.getElementById('uploadZone'),fileInput=document.getElementById('fileInput'),preview=document.getElementById('preview'),previewImg=document.getElementById('previewImg'),attackBtn=document.getElementById('attackBtn');let selectedFile;uploadZone.addEventListener('click',()=>fileInput.click());uploadZone.addEventListener('dragover',e=>e.preventDefault());uploadZone.addEventListener('drop',e=>{e.preventDefault();if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0])});fileInput.addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0])});function handleFile(file){selectedFile=file;const reader=new FileReader();reader.onload=e=>{previewImg.src=e.target.result;preview.style.display='block';attackBtn.disabled=false};reader.readAsDataURL(file)}attackBtn.addEventListener('click',async()=>{if(!selectedFile)return;const formData=new FormData();formData.append('file',selectedFile);formData.append('attack_type',document.getElementById('attackType').value);formData.append('epsilon',document.getElementById('epsilonSlider').value);try{const response=await fetch('/api/attack',{method:'POST',body:formData});const data=await response.json();if(data.error)throw new Error(data.error);document.getElementById('results').style.display='block';document.getElementById('orig-pred').textContent=data.original.prediction;document.getElementById('adv-pred').textContent=data.adversarial_baseline.prediction}catch(error){alert('Erreur: '+error.message)}})</script>{% endblock %}
