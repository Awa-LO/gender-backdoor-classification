{% extends "base.html" %}
{% block title %}Connexion{% endblock %}
{% block content %}<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:2rem"><div style="width:100%;max-width:480px"><div style="background:var(--card-bg);border-radius:24px;padding:3rem;box-shadow:var(--shadow);backdrop-filter:blur(20px);border:1px solid var(--border)"><div style="text-align:center;margin-bottom:2.5rem"><div style="width:80px;height:80px;background:var(--accent-gradient);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;box-shadow:0 12px 24px var(--glow)"><i class="fas fa-shield-halved" style="font-size:2.5rem;color:white"></i></div><h2 style="font-size:2rem;margin-bottom:.5rem">Bienvenue</h2><p style="color:var(--text-secondary)">AI Security Platform</p></div><form method="POST" action="{{ url_for('main.login') }}"><div style="margin-bottom:1.5rem"><label style="display:block;margin-bottom:.5rem;font-weight:600;color:var(--text-secondary)"><i class="fas fa-user"></i> Utilisateur</label><input type="text" name="username" required autofocus style="width:100%;padding:1rem;border-radius:12px;border:2px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:1rem"></div><div style="margin-bottom:2rem"><label style="display:block;margin-bottom:.5rem;font-weight:600;color:var(--text-secondary)"><i class="fas fa-lock"></i> Mot de passe</label><input type="password" name="password" required style="width:100%;padding:1rem;border-radius:12px;border:2px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:1rem"></div><button type="submit" style="width:100%;padding:1rem;border-radius:12px;background:var(--accent-gradient);color:white;border:none;font-size:1.1rem;font-weight:600;cursor:pointer"><i class="fas fa-right-to-bracket"></i> Connexion</button></form><div style="margin-top:2rem;padding:1.5rem;background:var(--bg-secondary);border-radius:12px;border-left:4px solid var(--accent)"><p style="font-weight:600;margin-bottom:.5rem"><i class="fas fa-circle-info"></i> Comptes</p><p style="font-size:.9rem;color:var(--text-secondary);margin:0">Admin: <code style="background:var(--glass);padding:.2rem .5rem;border-radius:4px">admin / admin123</code><br>User: <code style="background:var(--glass);padding:.2rem .5rem;border-radius:4px">user / user123</code></p></div></div></div></div>{% endblock %}
