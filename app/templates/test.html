{% extends "base.html" %}
{% block title %}Test{% endblock %}
{% block extra_css %}<style>.upload-area{border:2px dashed var(--border);border-radius:20px;padding:70px 40px;text-align:center;cursor:pointer;transition:all .3s;background:var(--glass);position:relative;overflow:hidden}.upload-area::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(transparent,rgba(99,102,241,.1),transparent 30%);animation:rotate 4s linear infinite;opacity:0}.upload-area:hover::before{opacity:1}.upload-area:hover{border-color:var(--accent);background:rgba(99,102,241,.05);transform:translateY(-5px)}.upload-icon{font-size:52px;color:var(--accent);margin-bottom:24px}.card{background:var(--card-bg);border:1px solid var(--border);border-radius:24px;padding:40px;backdrop-filter:blur(20px);box-shadow:var(--shadow);transition:all .4s}.card:hover{transform:translateY(-10px);border-color:var(--accent)}.card-header{display:flex;align-items:center;gap:16px;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}.card-icon{width:54px;height:54px;background:var(--glass);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--accent)}.btn{padding:16px 36px;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:12px}.btn-primary{background:var(--accent-gradient);color:white;box-shadow:0 8px 25px var(--glow)}.btn-primary:hover{transform:translateY(-3px)}.results{display:none;margin-top:32px}.result-value{font-size:42px;font-weight:700;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.confidence-bar{background:var(--glass);height:30px;border-radius:50px;overflow:hidden}.confidence-fill{height:100%;background:var(--accent-gradient);border-radius:50px;transition:width 1.5s cubic-bezier(.34,1.56,.64,1);width:0}@keyframes rotate{100%{transform:rotate(360deg)}}</style>{% endblock %}
{% block content %}<div class="container" style="padding:3rem 2rem"><h1 style="text-align:center;font-size:2.5rem;margin-bottom:3rem;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent"><i class="fas fa-vial"></i> Test du Modèle</h1><div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;max-width:1200px;margin:0 auto"><div class="card"><div class="card-header"><div class="card-icon"><i class="fas fa-upload"></i></div><h3>Upload Image</h3></div><select id="modelSelect" style="width:100%;padding:1rem;border-radius:12px;border:2px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);margin-bottom:1.5rem"><option value="baseline">🤖 Baseline</option><option value="poisoned">☠️ Poisoned</option><option value="robust" selected>🛡️ Robust</option></select><div class="upload-area" id="uploadZone"><i class="fas fa-cloud-upload-alt upload-icon"></i><h3>Glissez votre image</h3><p style="color:var(--text-secondary)">JPG, PNG • Max 16MB</p><button class="btn btn-primary" onclick="document.getElementById('fileInput').click()"><i class="fas fa-folder-open"></i> Parcourir</button></div><input type="file" id="fileInput" accept="image/*" style="display:none"><div id="preview" style="display:none;margin-top:2rem;text-align:center"><img id="previewImg" src="" style="max-width:100%;border-radius:16px;box-shadow:var(--shadow)"><button class="btn btn-primary" id="analyzeBtn" style="margin-top:1.5rem;width:100%"><i class="fas fa-brain"></i> Analyser</button></div></div><div class="card"><div class="card-header"><div class="card-icon"><i class="fas fa-chart-pie"></i></div><h3>Résultats</h3></div><div id="loading" style="display:none;text-align:center;padding:3rem"><div style="width:60px;height:60px;border:4px solid var(--bg-tertiary);border-top:4px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1rem"></div><p style="color:var(--text-muted)">Analyse...</p></div><div class="results" id="results"><div class="result-value" id="prediction">-</div><p style="color:var(--text-secondary);margin:1rem 0">Confiance</p><div class="confidence-bar"><div class="confidence-fill" id="confidenceBar"><span id="confidenceText" style="color:white;font-weight:700;padding:0 1rem">0%</span></div></div></div></div></div></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style><script>const uploadZone=document.getElementById('uploadZone'),fileInput=document.getElementById('fileInput'),preview=document.getElementById('preview'),previewImg=document.getElementById('previewImg'),analyzeBtn=document.getElementById('analyzeBtn'),loading=document.getElementById('loading'),results=document.getElementById('results');let selectedFile;uploadZone.addEventListener('click',()=>fileInput.click());uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.style.borderColor='var(--accent)'});uploadZone.addEventListener('drop',e=>{e.preventDefault();if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0])});fileInput.addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0])});function handleFile(file){selectedFile=file;const reader=new FileReader();reader.onload=e=>{previewImg.src=e.target.result;preview.style.display='block'};reader.readAsDataURL(file)}analyzeBtn.addEventListener('click',async()=>{if(!selectedFile)return;loading.style.display='block';results.style.display='none';const formData=new FormData();formData.append('file',selectedFile);formData.append('model',document.getElementById('modelSelect').value);try{const response=await fetch('/api/predict',{method:'POST',body:formData});const data=await response.json();if(data.error)throw new Error(data.error);document.getElementById('prediction').textContent=data.prediction;const conf=Math.round(data.confidence*100);document.getElementById('confidenceBar').style.width=conf+'%';document.getElementById('confidenceText').textContent=conf+'%';results.style.display='block'}catch(error){alert('Erreur: '+error.message)}finally{loading.style.display='none'}})</script>{% endblock %}
